services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    # Don't expose ports - Traefik handles routing
    # ports:
    #   - "80:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio.rule=Host(`1hemmem.site`)"
      - "traefik.http.routers.portfolio.entrypoints=websecure"
      - "traefik.http.routers.portfolio.tls.certResolver=letsencrypt"
      - "traefik.http.services.portfolio.loadbalancer.server.port=80"
networks:
  dokploy-network:
    external: true